services:
  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-careplan}
      - POSTGRES_USER=${POSTGRES_USER:-careplan}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-careplan}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-careplan} -d ${POSTGRES_DB:-careplan}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - POSTGRES_DB=${POSTGRES_DB:-careplan}
      - POSTGRES_USER=${POSTGRES_USER:-careplan}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-careplan}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
